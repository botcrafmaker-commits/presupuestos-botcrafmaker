<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOTCRAFmaker · Presupuestos Profesionales</title>
  <style>
    :root { --az: #1a6dff; --az-d: #1254cc; --ng: #111; --gr: #f4f6fa; --tx: #333; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: var(--gr); color: var(--tx); min-height: 100vh; }
    header { background: var(--ng); padding: 12px 30px; display: flex; align-items: center; justify-content: center; }
    .logo-img { height: 40px; }
    .steps { display: flex; justify-content: space-around; background: #fff; padding: 20px 0; border-bottom: 1px solid #eee; margin-bottom: 30px; position: sticky; top: 0; z-index: 10; }
    .st { display: flex; align-items: center; gap: 8px; color: #999; font-weight: 500; font-size: 0.9rem; }
    .st.active { color: var(--az); }
    .st i { width: 28px; height: 28px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; font-style: normal; }
    .st.active i { background: var(--az); color: #fff; }
    .cont { max-width: 600px; margin: 0 auto; padding: 0 20px 50px; }
    .card { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { font-size: 1.25rem; margin-bottom: 25px; font-weight: 600; color: #000; }
    .fg { margin-bottom: 20px; }
    label { display: block; font-size: 0.75rem; font-weight: 700; color: #777; text-transform: uppercase; margin-bottom: 8px; }
    input, select, textarea { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; transition: border-color 0.2s; outline: none; }
    input:focus { border-color: var(--az); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .btn { background: var(--az); color: #fff; border: none; padding: 14px 30px; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; transition: background 0.2s; }
    .btn:hover { background: var(--az-d); }
    .btn-sec { background: transparent; color: #666; border: 1px solid #ddd; margin-top: 10px; }
    .btn-sec:hover { background: #f9f9f9; }
    .line { border-top: 1px solid #f0f0f0; padding-top: 20px; margin-top: 20px; position: relative; }
    .btn-del { position: absolute; top: 20px; right: 0; color: #ff4d4d; border: none; background: none; font-size: 0.8rem; cursor: pointer; }
    #s2, #s3, #success { display: none; }
    .sum-row { display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dashed #eee; }
    .total { font-size: 1.3rem; font-weight: 700; color: var(--az); text-align: right; margin-top: 20px; }
    .loading { display: none; text-align: center; margin-top: 20px; color: var(--az); font-weight: 600; }
    .success-msg { text-align: center; padding: 40px 20px; }
    .success-msg i { font-size: 3rem; color: #2ecc71; display: block; margin-bottom: 20px; }
  </style>
</head>
<body>
  <header>
    <img src=\"https://i.ibb.co/6R0D9qY/logo-botcrafmaker.png\" alt=\"BOTCRAFmaker\" class=\"logo-img\">
  </header>
  <div class=\"steps\">
    <div class=\"st active\" id=\"st1\"><i>1</i> Cliente</div>
    <div class=\"st\" id=\"st2_ind\"><i>2</i> Líneas</div>
    <div class=\"st\" id=\"st3_ind\"><i>3</i> Confirmar</div>
  </div>
  <div class=\"cont\">
    <div id=\"s1\" class=\"card\">
      <h2>Datos del Cliente</h2>
      <div class=\"fg\"><label>Nombre / Razón Social</label><input type=\"text\" id=\"c_nom\" placeholder=\"Ej. Empresa S.L.\"></div>
      <div class=\"row\">
        <div class=\"fg\"><label>NIF / CIF</label><input type=\"text\" id=\"c_nif\" placeholder=\"B12345678\"></div>
        <div class=\"fg\"><label>Teléfono</label><input type=\"tel\" id=\"c_tel\" placeholder=\"600 000 000\"></div>
      </div>
      <div class=\"fg\"><label>Email</label><input type=\"email\" id=\"c_eml\" placeholder=\"correo@cliente.com\"></div>
      <div class=\"fg\"><label>Dirección</label><input type=\"text\" id=\"c_dir\" placeholder=\"Calle Ejemplo, 123\"></div>
      <div class=\"row\">
        <div class=\"fg\"><label>Nº Presupuesto</label><input type=\"text\" id=\"p_num\"></div>
        <div class=\"fg\"><label>Fecha</label><input type=\"date\" id=\"p_fec\"></div>
      </div>
      <button class=\"btn\" onclick=\"go(2)\">Siguiente</button>
    </div>
    <div id=\"s2\" class=\"card\">
      <h2>Líneas del Presupuesto</h2>
      <div id=\"lines_cont\"></div>
      <button class=\"btn btn-sec\" onclick=\"addLine()\" style=\"margin-bottom: 15px;\">+ Añadir Línea</button>
      <div class=\"row\">
        <button class=\"btn btn-sec\" onclick=\"go(1)\">Anterior</button>
        <button class=\"btn\" onclick=\"go(3)\">Resumen</button>
      </div>
    </div>
    <div id=\"s3\" class=\"card\">
      <h2>Resumen Final</h2>
      <div id=\"summary\"></div>
      <div class=\"total\" id=\"sum_total\"></div>
      <div class=\"row\" style=\"margin-top: 30px;\">
        <button class=\"btn btn-sec\" onclick=\"go(2)\">Editar</button>
        <button class=\"btn\" onclick=\"enviar()\">Generar PDF</button>
      </div>
      <div class=\"loading\" id=\"load\">Enviando a n8n...</div>
    </div>
    <div id=\"success\" class=\"card success-msg\">
      <i>✓</i>
      <h2>¡Presupuesto Enviado!</h2>
      <p>Se está generando el PDF. Recibirás una notificación en breve.</p>
      <button class=\"btn\" onclick=\"location.reload()\" style=\"margin-top: 30px;\">Crear Nuevo</button>
    </div>
  </div>
  <script>
    let lines = 0;
    const p_fec = document.getElementById('p_fec');
    const p_num = document.getElementById('p_num');
    const today = new Date();
    p_fec.valueAsDate = today;
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const yyyy = today.getFullYear();
    const rand = Math.floor(1000 + Math.random() * 9000);
    p_num.value = `PR-${yyyy}${mm}-${rand}`;
    function addLine() {
      lines++;
      const div = document.createElement('div');
      div.className = 'line';
      div.id = 'line_' + lines;
      div.innerHTML = '<button class=\"btn-del\" onclick=\"delLine(' + lines + ')\">Eliminar</button><div class=\"fg\"><label>Concepto</label><input type=\"text\" class=\"l_desc\" placeholder=\"Descripción\"></div><div class=\"row\"><div class=\"fg\"><label>Cant.</label><input type=\"number\" class=\"l_cant\" value=\"1\" onchange=\"calcTotal()\"></div><div class=\"fg\"><label>Precio (€)</label><input type=\"number\" class=\"l_pre\" value=\"0\" step=\"0.01\" onchange=\"calcTotal()\"></div></div>';
      document.getElementById('lines_cont').appendChild(div);
    }
    function delLine(id) { document.getElementById('line_'+id).remove(); calcTotal(); }
    function go(s) {
      ['s1','s2','s3'].forEach(id => document.getElementById(id).style.display = 'none');
      document.getElementById('s'+s).style.display = 'block';
      ['st1','st2_ind','st3_ind'].forEach((id, i) => {
        document.getElementById(id).classList.toggle('active', i+1 === s);
      });
      if(s === 3) showSummary();
    }
    function calcTotal() {
      let t = 0;
      document.querySelectorAll('.line').forEach(l => {
        const c = l.querySelector('.l_cant').value || 0;
        const p = l.querySelector('.l_pre').value || 0;
        t += c * p;
      });
      return t;
    }
    function showSummary() {
      const nom = document.getElementById('c_nom').value;
      const nif = document.getElementById('c_nif').value;
      const tel = document.getElementById('c_tel').value;
      const eml = document.getElementById('c_eml').value;
      const dir = document.getElementById('c_dir').value;
      const num = document.getElementById('p_num').value;
      const fec = document.getElementById('p_fec').value;
      let html = '<div class=\"sum-row\"><span>Cliente:</span><strong>' + nom + '</strong></div>';
      html += '<div class=\"sum-row\"><span>NIF/Tel:</span><strong>' + nif + ' / ' + tel + '</strong></div>';
      html += '<div class=\"sum-row\"><span>Email:</span><strong>' + eml + '</strong></div>';
      html += '<div class=\"sum-row\"><span>Dirección:</span><strong>' + dir + '</strong></div>';
      html += '<div class=\"sum-row\"><span>Presupuesto:</span><strong>' + num + ' (' + fec + ')</strong></div><br><h3>Líneas:</h3>';
      document.querySelectorAll('.line').forEach(l => {
        const d = l.querySelector('.l_desc').value;
        const c = l.querySelector('.l_cant').value;
        const p = l.querySelector('.l_pre').value;
        html += '<div class=\"sum-row\"><span>' + d + ' (x' + c + ')</span><strong>' + (c*p).toFixed(2) + '€</strong></div>';
      });
      document.getElementById('summary').innerHTML = html;
      document.getElementById('sum_total').innerText = 'TOTAL: ' + calcTotal().toFixed(2) + '€';
    }
    async function enviar() {
      const load = document.getElementById('load');
      load.style.display = 'block';
      const data = {
        emisor: \"Pedro Juan Muñoz Esteve\",
        nif_emisor: \"33468269A\",
        cliente: document.getElementById('c_nom').value,
        nif_cliente: document.getElementById('c_nif').value,
        tel_cliente: document.getElementById('c_tel').value,
        email_cliente: document.getElementById('c_eml').value,
        dir_cliente: document.getElementById('c_dir').value,
        numero: document.getElementById('p_num').value,
        fecha: document.getElementById('p_fec').value,
        total: calcTotal(),
        lineas: Array.from(document.querySelectorAll('.line')).map(l => ({
          descripcion: l.querySelector('.l_desc').value,
          cantidad: l.querySelector('.l_cant').value,
          precio: l.querySelector('.l_pre').value
        }))
      };
      try {
        await fetch('https://n8n.botcrafmaker.com/webhook/presupuestos', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(data)
        });
        document.getElementById('s3').style.display = 'none';
        document.getElementById('success').style.display = 'block';
      } catch (e) {
        alert('Error al enviar. Revisa el webhook.');
        load.style.display = 'none';
      }
    }
    addLine();
  </script>
</body>
</html>
