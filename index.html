<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOTCRAFmaker · Nuevo Presupuesto</title>
  <style>
    :root { --az: #1a6dff; --azd: #1254cc; --ng: #111; --gr: #f4f6fa; --gb: #dde1ea; --tx: #222; --er: #e03131; --ok: #2f9e44; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--gr); color: var(--tx); min-height: 100vh; }
    header { background: var(--ng); padding: 18px 28px; display: flex; align-items: center; }
    .logo { color: #fff; font-size: 1.3rem; font-weight: 700; letter-spacing: 1px; }
    .logo span { color: var(--az); }
    .pw { background: #fff; border-bottom: 1px solid var(--gb); padding: 0 28px; }
    .ps { display: flex; max-width: 740px; margin: 0 auto; }
    .st { flex: 1; padding: 14px 8px; text-align: center; font-size: .8rem; font-weight: 600; color: #999; border-bottom: 3px solid transparent; user-select: none; }
    .st.active { color: var(--az); border-bottom-color: var(--az); }
    .st.done { color: var(--ok); border-bottom-color: var(--ok); }
    .sn { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: #e9ecef; color: #999; font-size: .72rem; font-weight: 700; margin-right: 5px; }
    .st.active .sn { background: var(--az); color: #fff; }
    .st.done .sn { background: var(--ok); color: #fff; }
    .wrap { max-width: 740px; margin: 28px auto; padding: 0 14px 60px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 14px rgba(0,0,0,.07); padding: 28px; margin-bottom: 18px; }
    .card h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 5px; }
    .sub { font-size: .82rem; color: #777; margin-bottom: 22px; }
    .fr { display: flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
    .fg { flex: 1; min-width: 150px; display: flex; flex-direction: column; gap: 4px; }
    .fg label { font-size: .76rem; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .4px; }
    .fg input, .fg select { border: 1.5px solid var(--gb); border-radius: 7px; padding: 9px 11px; font-size: .93rem; outline: none; transition: border .15s; }
    .fg input:focus, .fg select:focus { border-color: var(--az); }
    .lh { display: grid; grid-template-columns: 2fr 62px 88px 62px 78px 32px; gap: 5px; padding: 0 8px 6px; border-bottom: 2px solid var(--gb); margin-bottom: 6px; }
    .lh span { font-size: .7rem; font-weight: 700; color: #888; text-transform: uppercase; }
    .lr { display: grid; grid-template-columns: 2fr 62px 88px 62px 78px 32px; gap: 5px; align-items: center; margin-bottom: 5px; padding: 7px; background: var(--gr); border-radius: 7px; }
    .lr input, .lr select { border: 1.5px solid var(--gb); border-radius: 6px; padding: 6px 7px; font-size: .86rem; background: #fff; width: 100%; outline: none; }
    .bdel { background: none; border: none; color: #ccc; font-size: 1rem; cursor: pointer; }
    .tb { background: var(--gr); border-radius: 10px; padding: 16px 18px; margin-top: 18px; }
    .tr { display: flex; justify-content: space-between; font-size: .88rem; padding: 3px 0; color: #555; }
    .tr.tf { border-top: 2px solid var(--gb); margin-top: 7px; padding-top: 9px; font-size: 1.1rem; font-weight: 700; color: var(--ng); }
    .bp { background: var(--az); color: #fff; border: none; border-radius: 8px; padding: 12px 26px; font-size: .96rem; font-weight: 700; cursor: pointer; }
    .bp:hover { background: var(--azd); }
    #s1, #s2, #s3 { display: none; }
    #s1.active, #s2.active, #s3.active { display: block; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header><div class="logo">BOTCRAF<span>maker</span></div></header>
  <div class="pw"><div class="ps"><div class="st active" id="t1"><span class="sn">1</span>Cliente</div><div class="st" id="t2"><span class="sn">2</span>Líneas</div><div class="st" id="t3"><span class="sn">3</span>Confirmar</div></div></div>
  <div class="wrap">
    <div id="s1" class="active">
      <div class="card">
        <h2>Datos del cliente</h2>
        <div class="fr"><div class="fg"><label>Nombre</label><input type="text" id="cli-nom"></div><div class="fg"><label>NIF</label><input type="text" id="cli-nif"></div></div>
      </div>
      <button class="bp" onclick="next(2)">Siguiente</button>
    </div>
    <div id="s2">
      <div class="card">
        <h2>Líneas</h2>
        <div class="lh"><span>Concepto</span><span>Cant</span><span>Precio</span><span>Desc</span><span>IVA</span><span></span></div>
        <div id="l-cont"></div>
        <button class="bp" style="background:none;color:var(--az);border:1px dashed var(--az)" onclick="add()">+ Línea</button>
      </div>
      <div style="display:flex;justify-content:space-between"><button class="bp" onclick="next(1)">Atrás</button><button class="bp" onclick="next(3)">Siguiente</button></div>
    </div>
    <div id="s3">
      <div class="card"><h2>Confirmar</h2><p>Revisa los datos.</p></div>
      <div style="display:flex;justify-content:space-between"><button class="bp" onclick="next(2)">Atrás</button><button class="bp" onclick="alert('Enviado')">Enviar</button></div>
    </div>
  </div>
  <script>
    function next(s){
      document.querySelectorAll('#s1,#s2,#s3').forEach(e=>e.classList.remove('active'));
      document.querySelectorAll('.st').forEach(e=>e.classList.remove('active'));
      document.getElementById('s'+s).classList.add('active');
      document.getElementById('t'+s).classList.add('active');
    }
    function add(){
      const d=document.createElement('div');d.className='lr';
      d.innerHTML='<input type="text"><input type="number" value="1"><input type="number"><input type="number" value="0"><select><option value="21">21%</option></select><button class="bdel" onclick="this.parentElement.remove()">×</button>';
      document.getElementById('l-cont').appendChild(d);
    }
  </script>
</body>
</html>
